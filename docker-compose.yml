version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: pizzacraft_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build: ./backend
    container_name: pizzacraft_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/pizzacraft
      - NODE_ENV=production
      - JWT_SECRET=super_secret_jwt_key_elusoc_2026
    depends_on:
      - mongodb
    restart: always

  frontend:
    build: ./frontend
    container_name: pizzacraft_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

volumes:
  mongodb_data:
