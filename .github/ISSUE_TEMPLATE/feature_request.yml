name: "✨ Feature Request"
description: "Suggest an idea or enhancement for this project"
title: "[ELUSoC_2026] Feature: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        We are always open to new ideas and features!
  - type: textarea
    id: problem
    attributes:
      label: "Is your feature request related to a problem?"
      description: "A clear and concise description of what the problem is."
      placeholder: "e.g. I am always frustrated when..."
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: "Describe the solution you'd like"
      description: "A clear and concise description of what you want to happen."
      placeholder: "Specify details of the proposed feature..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Describe alternatives you've considered"
      description: "A clear and concise description of any alternative solutions or features you've considered."
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Add any other context, mockup screenshots, or diagrams about the feature request here."
    validations:
      required: false
