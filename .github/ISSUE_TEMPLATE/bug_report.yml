name: "🐛 Bug Report"
description: "File a report to help us improve the Pizza Customization E-Commerce platform"
title: "[ELUSoC_2026] Bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: contact
    attributes:
      label: "Contact Details"
      description: "How can we get in touch with you if we need more details?"
      placeholder: "e.g. email@example.com or GitHub username"
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "A clear and concise description of what the bug is."
      placeholder: "Provide details of the unexpected behavior..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      description: "Steps to reproduce the behavior."
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "A clear and concise description of what you expected to happen."
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: "Environment Context"
      description: "Operating system, browser name/version, Node.js version, MongoDB version, etc."
      placeholder: "e.g. Windows 11, Chrome 120, Node v20"
    validations:
      required: false
